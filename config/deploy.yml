# Gemeinsame Kamal-Basiskonfiguration.
# Der produktive Zielpfad wird über `-d hetzner` geladen.

require_destination: true

service: russ_live_de
image: <%= ENV.fetch("KAMAL_IMAGE", "marcbey/russ-live-de") %>

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# Russ Live liest Stuttgarts Active-Storage-Dateien aus demselben Docker-Volume.
volumes:
  - "stuttgart_live_de_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  context: .
  arch: amd64
