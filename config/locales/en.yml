  services:
    items:
      local:
        title: "Local promoter"
        paragraphs:
          first: "We are the local promoter for the Stuttgart metropolitan region. Every year, we bring a wide range of artists from rock, pop and entertainment to the stage, drawing on decades of experience as part of Konzertdirektion Russ."
          second: "The size of the event does not matter to us: from clubs to stadium concerts, we find the right venue, develop communication plans, handle ticket sales and provide the staff needed for a strong production. We also deliver business events and major public events professionally."
      production:
        title: "Production & Technology"
        paragraphs:
          first: "As one of the largest concert promoters in southern Germany, we look back on many years of event concept, planning and delivery. We gladly make this expertise and our broad industry network available for your events, whether as a full-service partner or for selected areas."
          second: "We produce events of every type and scale. Art and culture are in our blood, and when audience numbers grow, our work truly comes alive."
      marketing:
        title: "Marketing"
        paragraphs:
          first: "Who is my target audience, how and through which channels can I reach them, and which advertising materials are needed? There are many questions to answer. With our know-how and broad partner network, we find tailored, competent answers for every requirement."
      staff:
        title: "Staffing"
        paragraphs:
          first: "We are only as good as each member of our team. Every person matters to us, whether cleaning specialist or managing director. We are one team, and outstanding events are created together."
          second: "Some of the most important work is done by our production staff behind the scenes. Without them, nothing would work. We are fortunate to employ more than 300 stagehands, forklift drivers, catering assistants and security specialists directly, whether permanent, part-time, occasional or short-term. We pay clearly above minimum wage, even for straightforward tasks."
      ticketing:
        title: "Ticket portal"
        paragraphs:
          first: "Stuttgart-live is the ticket portal for all major events in the Stuttgart region: online booking, quick, straightforward and with excellent service."
          second: "Event data will remain connected read-only in the long term. This Russ Live site will only use approved event data."
  pages:
    home:
      meta:
        title: "Russ Live | Cultural productions at the highest level"
        description: "Russ Live is a local promoter, production partner and full-service provider for live entertainment in Stuttgart and the region."
      hero:
        image_alt: "Golden guitar as the Russ Live key visual"
        intro: "Your local promoter for Stuttgart. We always keep both artists and audiences in view, creating unique emotional moments for up to 1 million visitors every year."
      services:
        eyebrow: "Live Entertainment"
        title: "Full service for events"
        intro: "From local delivery to production, marketing, staffing and ticketing: Russ Live combines experience, network and execution."
        local_partners: "Including Live Nation, Karsten Jahnke Konzertdirektion, Wizard Live"
        production_contact_html: "Management<br>Phone +49.711.16 353 27"
        marketing_contact_html: "Marketing<br>Phone +49.711.16 353 16<br>/ sarahsandner@russ-live.de"
        legal_links_html: "© SKS Michael Russ GmbH <br>Imprint<br>Privacy policy<br>Terms<br>Youth protection"
        staff_equal_opportunity: "Equal opportunity and equal treatment regardless of ethnic origin, skin color, gender, religion, nationality, sexual orientation, social background or political views, insofar as these are based on democratic principles and tolerance toward different opinions, are ensured. Employees are selected, hired and supported on the basis of their qualifications and abilities."
      references:
