    jugendschutz:
      meta:
        title: "Youth protection | Russ Live"
        description: "Youth protection information of SKS Michael Russ GmbH."
      title: "Youth protection"
      paragraphs:
        - "Many people, high volumes, show times late into the evening: is this event suitable for my child? Please consider this carefully; nobody knows your child as well as you do. You can call us at any time on 0711-55066077 or email info@stuttgart-live.de. We will be happy to advise you, because sometimes investing in childcare is more relaxed for everyone."
        - "Age recommendations and age restrictions are regulated in detail for every event. They are legally binding and form part of our general terms and conditions. You can find the age restrictions in the respective event description on this website."
        - "In general, age restrictions follow these rules: children under 8 are usually not allowed to attend evening events and concerts. Children under 14 may usually only attend events when accompanied by an authorized guardian. Young people aged 14 to under 16 may usually attend concerts until 10 p.m.; young people over 16 may attend until midnight, after which they must be accompanied by a parent or authorized guardian."
        - "Parents or legal guardians are the mother and/or father or the legal guardian. An authorized guardian may be any adult over 18 if they actually assume parental duties with the parents' consent. They must be able to fulfill supervisory duties within the assigned task, meaning they must be able to guide and supervise the young people entrusted to them. A parental authorization form signed by the parents must be presented. A copy of the relevant parent's ID must also be enclosed. The responsible person named above must supervise the child during the event and needs an admission ticket. Each accompanying person may supervise no more than two children. All children and young people under 18 should be able to identify themselves with a child ID or personal ID."
        - "We provide the relevant form for download here:"
