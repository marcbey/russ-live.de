    about:
      hero:
        eyebrow: "About us"
        title_lines:
          people: "People."
          moments: "Moments."
          since: "Since 1945."
        intro: "From Stuttgart. For the world. For three generations, we have created concerts that connect people."
      profile_title: "Company profile"
      story:
        first_html: "<strong>Michael Russ Jr.</strong> grew into the world of Russ Live with calm closeness, heart and genuine entrepreneurial spirit. Over the years, this became responsibility, experience and a clear sense of how to make culture last."
        second_html: "<strong>Michaela Russ</strong> continues this path in the third generation. Together, the family stands for productions that are professionally organized while remaining human. This has created a team that delivers culture with attitude, reliability and passion."
      company:
        eyebrow: "Konzertdirektion Russ"
        title_html: "Konzertdirektion Russ: a whole world of concerts, artists and events."
        intro: "We want to make people happy."
        button: "Konzertdirektion"
        open_aria: "Open %{title}"
        areas:
          live: "Whether club or stadium concerts, musicals, shows or your next corporate event: we are your strong partner."
          artists: "Your committed partner in finding artists and programs that fit your promoter profile."
          service: "We ensure a safe event: concert, conference, company celebration or convention."
          klassik: "Discover the fascinating world of classical music with us. Master concerts for Stuttgart. Since 1945."
      history:
        eyebrow: "History"
        title: "Our history. Three generations. One attitude."
        image_alt: "Michaela Russ, Michael Russ and a historic family portrait"
        first: "What began with a vision in 1945 is now one of Europe's leading concert agencies. From Stuttgart, Russ has helped shape concert history for decades while preserving its closeness to the region."
        second: "This combination of local roots and international ambition still shapes our view today: we think big, work in partnership and always keep the people behind every production in focus."
      award:
        eyebrow: "Responsibility"
        title: "Experience that never stands still."
        image_alt: "Michael Russ Jr. with an award and partner at an awards ceremony"
        first: "Whether tour, one-off show, cultural format or major event: we combine deep industry knowledge with the ambition to keep evolving. This creates the mix of precision, calm and curiosity that defines our work."
        second: "Awards make us happy. More important to us, however, is that artists, audiences, partners and teams can rely on us."
      city:
        eyebrow: "Perspective"
        title: "From Stuttgart to the world."
        small_image_alt: "Historic concert photo of Ike and Tina Turner"
        large_image_alt: "Major event in Stuttgart with a classic car parade"
        first: "Whether in Stuttgart's Liederhalle, on large festival grounds, in arenas or open-air productions: we bring people together. Live. Real. Unforgettable."
        second: "The city is our starting point, not our boundary. From here, we develop formats that are regionally rooted and reach far beyond."
      closing:
        eyebrow: "Today"
        title: "For us, tradition is not a look back, but trust in what comes next."
        text: "Russ Live stands for experience without stagnation, quality without attitude and productions that understand culture as a shared task."
