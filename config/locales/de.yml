          since: "Seit 1945."
        intro: "Aus Stuttgart. Für die Welt. Seit drei Generationen gestalten wir Konzerte, die verbinden."
      profile_title: "Unternehmensprofil"
      story:
        first_html: "<strong>Michael Russ Jr.</strong> ist mit einer ruhigen Nähe, viel Herz und echtem Unternehmergeist auf die Welt von Russ Live gewachsen. Im Laufe der Jahre wurde daraus Verantwortung, Erfahrung und ein klarer Blick dafür, wie man Kultur dauerhaft möglich macht."
        second_html: "<strong>Michaela Russ</strong> führt diesen Weg in der dritten Generation weiter. Gemeinsam steht die Familie für Produktionen, die professionell organisiert sind und trotzdem menschlich bleiben. Daraus ist ein Team entstanden, das Kultur mit Haltung, Verlässlichkeit und Leidenschaft umsetzt."
      company:
        eyebrow: "Konzertdirektion Russ"
        title_html: "Konzertdirektion Russ: Eine ganze Welt aus Konzerten, Künstlern und Events."
        intro: "Wir wollen Menschen glücklich machen."
        button: "Konzertdirektion"
        open_aria: "%{title} öffnen"
        areas:
          live: "Ob Club- oder Stadion-Konzerte, Musicals, Shows oder ihr nächstes Firmenevent. Wir sind ihr starker Partner."
          artists: "Ihr engagierter Partner bei der Suche nach Künstlern und Programmen, die Ihrem Veranstalterprofil entsprechen."
          service: "Wir sorgen für eine sichere Veranstaltung: Konzert, Tagung, Firmenfeier oder Konferenz."
          klassik: "Entdecken Sie bei uns die faszinierende Welt der klassischen Musik. Meisterkonzerte für Stuttgart. Seit 1945."
      history:
        eyebrow: "Geschichte"
        title: "Unsere Geschichte. Drei Generationen. Eine Haltung."
        image_alt: "Michaela Russ, Michael Russ und ein historisches Familienportrait"
        first: "Was 1945 mit einer Vision begann, ist heute eine der führenden Konzertdirektionen Europas. Von Stuttgart aus hat Russ über Jahrzehnte Konzertgeschichte mitgeprägt und sich gleichzeitig die Nähe zur Region bewahrt."
        second: "Diese Verbindung aus lokaler Verwurzelung und internationalem Anspruch prägt unseren Blick bis heute: Wir denken groß, arbeiten partnerschaftlich und behalten immer die Menschen hinter jeder Produktion im Fokus."
      award:
        eyebrow: "Verantwortung"
        title: "Erfahrung, die nicht stillsteht."
        image_alt: "Michael Russ Jr. mit Auszeichnung und Partner bei einer Preisverleihung"
        first: "Ob Tournee, Einzelshow, Kulturformat oder Großereignis: Wir verbinden gewachsene Branchenkenntnis mit dem Anspruch, uns immer weiterzuentwickeln. Genau daraus entsteht die Mischung aus Präzision, Ruhe und Neugier, die unsere Arbeit auszeichnet."
        second: "Auszeichnungen freuen uns. Wichtiger ist uns aber, dass Künstler, Publikum, Partner und Teams sich auf uns verlassen können."
      city:
        eyebrow: "Perspektive"
        title: "Von Stuttgart in die Welt."
        small_image_alt: "Historisches Konzertfoto von Ike und Tina Turner"
        large_image_alt: "Großveranstaltung in Stuttgart mit Oldtimer-Korso"
        first: "Ob in der Stuttgarter Liederhalle, auf den großen Festivalflächen, in Arenen oder Open-Air-Produktionen: Wir bringen Menschen zusammen. Live. Echt. Unvergesslich."
        second: "Die Stadt ist unser Ausgangspunkt, nicht unsere Grenze. Aus ihr heraus entwickeln wir Formate, die regional verankert sind und weit darüber hinaus wirken."
      closing:
        eyebrow: "Heute"
        title: "Tradition ist für uns kein Rückblick, sondern Vertrauen in das, was als Nächstes kommt."
        text: "Russ Live steht für Erfahrung ohne Stillstand, für Qualität ohne Attitüde und für Produktionen, die Kultur als gemeinsame Aufgabe begreifen."
