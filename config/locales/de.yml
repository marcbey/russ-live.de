  services:
    items:
      local:
        title: "Örtlicher Veranstalter"
        paragraphs:
          first: "Wir sind der örtliche Veranstalter in der Metropolregion Stuttgart. Jedes Jahr bringen wir eine Vielzahl an Künstler*innen aus Rock, Pop und Unterhaltung auf die Bühne und können hierbei als Unternehmen der Konzertdirektion Russ auf eine langjährige Erfahrung zurückgreifen."
          second: "Dabei spielt die Größe der Veranstaltung für uns keine Rolle – wir finden von Club- bis hin zu Stadionkonzerten die optimale Location, erarbeiten passende Kommunikationspläne, kümmern uns um den Kartenverkauf und stellen mit unserem Personal die ideale Produktion sicher. Auch Businessevents oder öffentliche Großveranstaltungen werden mit uns professionell umgesetzt."
      production:
        title: "Produktion & Technik"
        paragraphs:
          first: "Als einer der größten Konzertveranstalter im süddeutschen Raum blicken wir auf viele Jahre der Konzeption, Planung und Durchführung von Events zurück. Diese Expertise und unser großes Branchennetzwerk stellen wir Ihnen gerne für Ihre Veranstaltungen zur Verfügung. Ob als Full Service oder nur in einzelnen Bereichen."
          second: "Wir realisieren alle Arten und Größen von Veranstaltungen. Aber natürlich liegt uns Kunst und Kultur im Blut und wenn es richtig viele Besucher werden, dann blühen wir auf."
      marketing:
        title: "Marketing"
        paragraphs:
          first: "Wer ist meine Zielgruppe, wie und über welche Kanäle kann ich sie erreichen und welche Werbemittel werden benötigt? Es sind viele Fragen, die es zu beantworten gilt. Durch unser Know-How und großes Partnernetzwerk finden wir für alle Fragen und Anforderungen maßgeschneiderte und kompetente Antworten."
      staff:
        title: "Personal"
        paragraphs:
          first: "Wir sind nur so gut, wie jeder unserer Mitarbeiter. Das bedeutet, dass uns jeder wichtig ist, egal ob Reinigungsfachkraft oder Geschäftsführer – wir sind ein Team und zusammen entstehen herausragende Veranstaltungen."
          second: "Mit die wichtigste Arbeit leistet unser Produktionspersonal hinter den Kulissen. Ohne sie würde rein gar nichts funktionieren. Wir haben das große Glück, dass über 300 Stagehands, Staplerfahrer, Cateringhilfen und Sicherheitsfachkräfte direkt bei uns beschäftigt sind – festangestellt, in Teilzeit oder auch nur gelegentlich und kurzfristig. Wir zahlen deutlich über Mindestlohn, auch bei ganz einfachen Tätigkeiten."
      ticketing:
        title: "Ticketportal"
        paragraphs:
          first: "Stuttgart-live ist das Ticketportal mit allen wichtigen Veranstaltungen in der Region Stuttgart: online buchen, schnell, unkompliziert und mit perfektem Service."
          second: "Die Eventdaten bleiben perspektivisch read-only angebunden. Diese Russ-live-Seite greift später nur auf freigegebene Veranstaltungsdaten zu."
  pages:
